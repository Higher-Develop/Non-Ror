; ============================================================
; Version Configuration File
; ไฟล์นี้ต้องอัพโหลดไปที่ GitHub Repository ของคุณ
; URL: https://raw.githubusercontent.com/your-username/your-repo/main/version.ini
; ============================================================

[Version]
; เวอร์ชันล่าสุดของโปรแกรม
Version=1.0.1

; วันที่ปล่อยเวอร์ชัน
ReleaseDate=2025-01-15

; Release Notes (ใช้ `n สำหรับขึ้นบรรทัดใหม่)
ReleaseNotes=- เพิ่มฟีเจอร์ Auto-Update`n- แก้ไขบัคการแสดงผล`n- ปรับปรุงประสิทธิภาพ

; บังคับอัพเดท (1 = บังคับ, 0 = ไม่บังคับ)
Mandatory=0

; URL สำหรับดาวน์โหลดโดยตรง (ถ้าเว้นว่างจะใช้ GitHub Releases)
DownloadURL=

; ขนาดไฟล์เป็น bytes (สำหรับแสดง Progress)
FileSize=0

[Checksum]
; MD5 หรือ SHA256 สำหรับตรวจสอบความถูกต้อง
MD5=
SHA256=

[Beta]
; เวอร์ชัน Beta (ถ้ามี)
BetaVersion=1.1.0-beta.1
BetaAvailable=0
BetaNotes=เวอร์ชันทดสอบ - อาจมีบัค

[Messages]
; ข้อความแจ้งเตือนต่างๆ
UpdateMessage=มีเวอร์ชันใหม่ให้ดาวน์โหลด!
CriticalMessage=